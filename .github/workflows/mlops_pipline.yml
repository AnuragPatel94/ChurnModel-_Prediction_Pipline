name: MLOps Pipeline

on:
  push:
    branches: [cicd]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: churn-model-bucket

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Setup Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3️⃣ Cache dependencies (🔥 speed boost)
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

    # 4️⃣ Install dependencies
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install "dvc[s3]"

    # 5️⃣ Generate dataset
    - name: Generate dataset
      run: python generate_data.py

    # 6️⃣ Train model
    - name: Train model
      run: python train.py

    # 7️⃣ Validate model (🔥 important)
    - name: Validate model
      run: |
        python -c "import pickle; pickle.load(open('models/churn_model.pkl','rb')); print('Model OK')"

    # 8️⃣ Configure AWS
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 9️⃣ Push model (Option A: Direct S3)
    - name: Upload model to S3
      run: |
        aws s3 cp models/churn_model.pkl s3://churnmodel-bucket-anu/models/churn_model.pkl

    # 🔟 (Optional) Use DVC instead
    # - name: DVC push
    #   run: |
    #     dvc push

    # 1️⃣1️⃣ Update deployment YAML
    - name: Update inference.yaml
      run: |
        MODEL_URI="s3://${{ env.S3_BUCKET }}/models/churn_model.pkl"
        sed -i "s|storageUri: .*|storageUri: $MODEL_URI|g" k8s/inference.yaml

    # 1️⃣2️⃣ Commit changes safely
    - name: Commit changes
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add k8s/inference.yaml
        
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update model path [skip ci]"
          git push
        